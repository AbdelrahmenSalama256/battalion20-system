version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: battalion20-db
    environment:
      POSTGRES_DB: battalion20
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql

volumes:
  pgdata:
